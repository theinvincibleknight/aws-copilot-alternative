AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ECR Repository for a single service.
  Stack naming: {AppName}-ecr-{ServiceName}

Parameters:
  AppName:
    Type: String
    Description: Application name (e.g., myapp)
  ServiceName:
    Type: String
    Description: Service name (e.g., order-service)
  Department:
    Type: String
    Description: Department tag value (e.g., IT)

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${AppName}/${ServiceName}'
      Tags:
        - Key: app
          Value: !Ref AppName
        - Key: service
          Value: !Ref ServiceName
        - Key: Department
          Value: !Ref Department
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPushPull
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 20 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

Outputs:
  RepositoryUri:
    Description: ECR Repository URI
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub '${AppName}-ecr-${ServiceName}-uri'
  RepositoryArn:
    Description: ECR Repository ARN
    Value: !GetAtt ECRRepository.Arn
    Export:
      Name: !Sub '${AppName}-ecr-${ServiceName}-arn'
